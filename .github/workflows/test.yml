name: Unit Tests & Quality Gates
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
jobs:
  quality:
    name: Test · Typecheck · Lint · Whitelist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run unit tests
        run: npm test -- --ci --verbose
      - name: TypeScript check
        run: npm run typecheck
      - name: Lint — report layer
        run: npm run lint:report
      - name: Client Display whitelist check
        run: npm run check:whitelist
